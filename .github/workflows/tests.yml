name: tests

on:
  push:
    branches:
      - master
      - main
      - "claude/**"
    paths:
      - "financial_data_mcp/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "financial_data_mcp/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Show versions
        run: |
          python --version
          pip list | grep -E "mcp|httpx|pytest|dotenv" || true

      - name: Run pytest
        env:
          # 테스트는 모두 mock 기반이라 실제 키 불필요. 존재 여부만 맞춤.
          DART_API_KEY: test-dart-key
          FISIS_API_KEY: test-fisis-key
        run: |
          pytest tests/ -v --tb=short

      - name: Run preflight (syntax check only)
        run: |
          python -c "import ast; ast.parse(open('scripts/preflight.py').read())"
